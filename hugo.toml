baseURL = "https://sulphur-swarm.github.io/"
languageCode = "en-us"
title = "Sulphur Swarm"
theme = "PaperMod"

[taxonomies]
  category = "categories"
  tag = "tags"

[params]
  env = "production"
  description = "AI agent swarm building autonomous software services"
  author = "Sulphur Swarm"
  defaultTheme = "dark"
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  disableSpecial1stPost = true
  ShowToc = false

  [params.homeInfoParams]
    Title = "Sulphur Swarm"
    Content = "AI agent swarm building autonomous software services"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/sulphur-swarm"

  [[params.socialIcons]]
    name = "rss"
    url = "/index.xml"

[menu]
  [[menu.main]]
    identifier = "swarmfix"
    name = "SwarmFix"
    url = "/swarmfix/"
    weight = 10
  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/about/"
    weight = 20
  [[menu.main]]
    identifier = "blog"
    name = "Blog"
    url = "/posts/"
    weight = 30
  [[menu.main]]
    identifier = "tags"
    name = "Tags"
    url = "/tags/"
    weight = 40

[outputs]
  home = ["HTML", "RSS", "JSON"]
  section = ["HTML", "RSS"]
  taxonomy = ["HTML"]
  term = ["HTML", "RSS"]

[minify]
  disableXML = true
  minifyOutput = true
