# Auto-Label Workflow
# -------------------
# Triggered when a new issue is opened. Detects which issue template was
# used by scanning the issue body and title for tier-specific markers,
# then applies the corresponding tier label and the `status:new` label.
#
# Template → Label mapping:
#   free-fix  template → tier:free
#   quick-fix template → tier:quick
#   complex-fix template → tier:complex
#
# Short-circuit: if the issue already has a tier:* label AND status:new
# (set automatically by the issue form template's YAML frontmatter), skip
# all detection logic — nothing to do.

name: Auto Label

on:
  issues:
    types: [opened]

permissions:
  issues: write

# Prevent duplicate runs for the same issue
concurrency:
  group: auto-label-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  apply-labels:
    runs-on: ubuntu-latest
    steps:
      - name: Detect template and apply tier + status labels
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const body = (issue.body || '').toLowerCase();
            const title = (issue.title || '').toLowerCase();
            const issueNumber = issue.number;

            // Collect existing label names
            const existingLabels = issue.labels.map(l => l.name);

            // Short-circuit: if the issue already has a tier label AND status:new,
            // these were set by the issue form template — nothing to do.
            const hasTierLabel = existingLabels.some(l => l.startsWith('tier:'));
            const hasStatusNew = existingLabels.includes('status:new');

            if (hasTierLabel && hasStatusNew) {
              console.log('Labels already set by issue template — skipping auto-label');
              return;
            }

            // For issues opened without a template, detect tier from content
            const labelsToAdd = [];

            if (body.includes('free fix') || body.includes('free-fix') ||
                title.includes('free fix') || title.includes('free-fix')) {
              if (!existingLabels.includes('tier:free')) labelsToAdd.push('tier:free');
              console.log('Detected free-fix template');
            } else if (body.includes('complex fix') || body.includes('complex-fix') ||
                       title.includes('complex fix') || title.includes('complex-fix')) {
              if (!existingLabels.includes('tier:complex')) labelsToAdd.push('tier:complex');
              console.log('Detected complex-fix template');
            } else if (body.includes('quick fix') || body.includes('quick-fix') ||
                       title.includes('quick fix') || title.includes('quick-fix')) {
              if (!existingLabels.includes('tier:quick')) labelsToAdd.push('tier:quick');
              console.log('Detected quick-fix template');
            } else {
              console.log('No template match found; skipping tier label');
            }

            if (!existingLabels.includes('status:new')) {
              labelsToAdd.push('status:new');
            }

            if (labelsToAdd.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                labels: labelsToAdd
              });
              console.log(`Applied labels: ${labelsToAdd.join(', ')}`);
            } else {
              console.log('No new labels to apply');
            }
