name: Payment Timeout — Expire stale payment-pending issues

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch: {}

concurrency:
  group: payment-timeout
  cancel-in-progress: false

permissions:
  issues: write
  contents: read

jobs:
  expire-stale-payments:
    name: Expire stale payment-pending issues
    runs-on: ubuntu-latest

    steps:
      - name: Expire stale payment-pending issues
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const PAYMENT_PENDING_LABEL = 'status:payment-pending';
            const PAYMENT_EXPIRED_LABEL = 'status:payment-expired';
            const EXPIRY_COMMENT =
              "⏰ Payment window has expired (48 hours). Please submit a new request if you'd like to proceed.";
            const TIMEOUT_MS = 48 * 60 * 60 * 1000;
            const { owner, repo } = context.repo;

            // Ensure the expired label exists
            try {
              await github.rest.issues.getLabel({ owner, repo, name: PAYMENT_EXPIRED_LABEL });
              core.info(`Label '${PAYMENT_EXPIRED_LABEL}' already exists.`);
            } catch (err) {
              if (err.status === 404) {
                await github.rest.issues.createLabel({
                  owner, repo,
                  name: PAYMENT_EXPIRED_LABEL,
                  color: 'b60205',
                  description: 'Payment window expired — issue closed without payment',
                });
                core.info(`Created label '${PAYMENT_EXPIRED_LABEL}'.`);
              } else {
                throw err;
              }
            }

            // Fetch all open issues with payment-pending label
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner, repo,
              state: 'open',
              labels: PAYMENT_PENDING_LABEL,
              per_page: 100,
            });

            core.info(`Found ${issues.length} open issue(s) with label '${PAYMENT_PENDING_LABEL}'.`);

            let expiredCount = 0;

            for (const issue of issues) {
              try {
                // Get timeline to find when label was applied
                const timeline = await github.paginate(
                  github.rest.issues.listEventsForTimeline,
                  { owner, repo, issue_number: issue.number, per_page: 100,
                    mediaType: { previews: ['mockingbird'] } }
                );

                // Find the most recent 'labeled' event for our label
                const labelEvents = timeline.filter(
                  e => e.event === 'labeled' && e.label?.name === PAYMENT_PENDING_LABEL
                );

                let labeledAt;
                if (labelEvents.length > 0) {
                  labeledAt = labelEvents[labelEvents.length - 1].created_at;
                } else {
                  core.warning(`No labeled event found for issue #${issue.number}; using issue.created_at`);
                  labeledAt = issue.created_at;
                }

                const ageMs = Date.now() - new Date(labeledAt).getTime();
                const ageHours = (ageMs / 3_600_000).toFixed(1);

                if (ageMs > TIMEOUT_MS) {
                  core.info(`Issue #${issue.number}: labeled at ${labeledAt} — EXPIRED (${ageHours}h) — processing`);

                  // Remove payment-pending label
                  try {
                    await github.rest.issues.removeLabel({
                      owner, repo, issue_number: issue.number,
                      name: PAYMENT_PENDING_LABEL,
                    });
                  } catch (removeErr) {
                    if (removeErr.status === 404 || removeErr.status === 410) {
                      core.warning(`Label already removed from issue #${issue.number}`);
                    } else {
                      throw removeErr;
                    }
                  }

                  // Add payment-expired label
                  await github.rest.issues.addLabels({
                    owner, repo, issue_number: issue.number,
                    labels: [PAYMENT_EXPIRED_LABEL],
                  });

                  // Post expiry comment
                  await github.rest.issues.createComment({
                    owner, repo, issue_number: issue.number,
                    body: EXPIRY_COMMENT,
                  });

                  // Close the issue
                  await github.rest.issues.update({
                    owner, repo, issue_number: issue.number,
                    state: 'closed',
                    state_reason: 'not_planned',
                  });

                  expiredCount++;
                  core.info(`Issue #${issue.number}: expired and closed.`);
                } else {
                  core.info(`Issue #${issue.number}: labeled at ${labeledAt} — still active (${ageHours}h)`);
                }

                // Rate-limit buffer between issues
                await new Promise(resolve => setTimeout(resolve, 500));

              } catch (issueErr) {
                core.error(`Failed to process issue #${issue.number}: ${issueErr.message}`);
              }
            }

            core.info(`Done. Expired ${expiredCount} / ${issues.length} issue(s).`);
