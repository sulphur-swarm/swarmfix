name: "🔧 Complex Fix Request"
description: "Submit a large feature or architecture change request ($50–$500)"
title: "[Complex Fix]: "
labels: ["tier:complex", "status:new"]
body:
  - type: markdown
    attributes:
      value: |
        ## Complex Fix Request
        Complex fixes cover architecture changes, large features, and cross-cutting concerns.
        **Pricing: $50–$500** (quote provided after initial assessment)

  - type: input
    id: repository
    attributes:
      label: "Repository URL"
      description: "Full URL of the GitHub repository"
      placeholder: "https://github.com/owner/repo"
    validations:
      required: true

  - type: input
    id: issue-link
    attributes:
      label: "Issue Link (if exists)"
      description: "Link to an existing issue in your repo, if applicable"
      placeholder: "https://github.com/owner/repo/issues/123"
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: "Description"
      description: "Describe the feature or change you need"
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: "Scope & Impact"
      description: "Describe the scope of changes and what areas of the codebase are affected"
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: "Acceptance Criteria"
      description: "How will you verify the work is correct?"
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: "Actual Behavior"
      description: "If reporting a bug, describe what currently happens"
    validations:
      required: false

  - type: dropdown
    id: language
    attributes:
      label: "Language / Framework"
      description: "Primary language or framework of the affected code"
      options:
        - "JavaScript / TypeScript"
        - "Python"
        - "Go"
        - "Rust"
        - "Java"
        - "C / C++"
        - "Ruby"
        - "Other"
    validations:
      required: false

  - type: textarea
    id: constraints
    attributes:
      label: "Technical Constraints"
      description: "Any architectural constraints, compatibility requirements, or dependencies"
    validations:
      required: false

  - type: dropdown
    id: urgency
    attributes:
      label: "Urgency"
      options:
        - "Low — no rush"
        - "Medium — within a week"
        - "High — within 48 hours"
    validations:
      required: true

  - type: textarea
    id: budget
    attributes:
      label: "Budget Range"
      description: "What is your approximate budget for this work?"
      placeholder: "$50–$500"
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: "Additional Context"
      description: "Any additional context, designs, mockups, or references"
    validations:
      required: false
